<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceAi</title>
    <link rel="stylesheet" href="financeai.css" />
    <link rel="shortcut icon" href="images/Group.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
  </head>
  <body onload="displayData()" id="body">
    <div class="modalWidth" id="modalWidth">
      <div
        class="backgroundModal"
        onclick="closemodal()"
        id="backgroundModal"
      ></div>
      <div class="transactionModal" id="transactionModal">
        <div class="modalTittle">
          <h1 class="addTransactionText">Adicionar Transação</h1>
          <p class="financialicons">Insira as informações abaixo</p>
        </div>
        <div class="inputsDiv">
          <p class="itemTittle">Título</p>
          <input
            type="text"
            name="tittle"
            class="inputs"
            placeholder="Título"
            required
            id="tittle"
          />
        </div>
        <div class="inputsDiv">
          <p class="itemTittle">Valor</p>
          <input
            type="text"
            name="value"
            class="inputs"
            placeholder="R$ 0.000,00"
            required
            id="value"
          />
        </div>
        <div class="inputsDiv">
          <p class="itemTittle">Tipo da Transação</p>
          <select
            name="transactionType"
            class="inputs"
            required
            id="transactionType"
          >
            <option value="" disabled selected>Selecione</option>
            <option value="1">Receita</option>
            <option value="2">Despesas</option>
            <option value="3">Investimentos</option>
          </select>
        </div>
        <div class="inputsDiv">
          <p class="itemTittle">Método de pagamento</p>
          <select
            name="paymentMethod"
            class="inputs"
            required
            id="paymentMethod"
          >
            <option value="" disabled selected>Selecione</option>
            <option value="1">Cartão de Crédito</option>
            <option value="2">Cartão de Débito</option>
            <option value="3">Dinheiro</option>
          </select>
        </div>
        <div class="inputsDiv">
          <p class="itemTittle">Data</p>
          <input type="date" name="date" class="inputs" required id="date" />
        </div>
        <div class="modalButtons">
          <div style="width: 100%">
            <button
              class="modalButton"
              style="background-color: #1f1f21; width: 100%"
              onclick="closemodal()"
              id="cancelButton"
            >
              Cancelar
            </button>
          </div>
          <div style="width: 100%">
            <button
              onclick="add()"
              class="modalButton"
              style="
                background-color: rgb(85, 176, 46);
                color: rgb(255, 255, 255);
                width: 100%;
              "
              id="button"
            >
              Adicionar
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="navbar">
      <div id="barinterior">
        <div id="logo">
          <img src="images/Frame 82.svg" alt="FinanceAi logo" />
        </div>
        <div class="menupage"><a href="financeai.html">Dashboard</a></div>
        <div class="menupage"><a href="transactions.html">Transações</a></div>
        <div class="menupage"><a href="subscription.html">Assinatura</a></div>
      </div>
      <div id="user">
        <div id="userinterior">
          <img
            src="images/userpfp.txt"
            alt="pfp"
            style="width: 20px; height: 20px; flex-shrink: 0"
          />Usuário
        </div>
      </div>
    </div>
    <div class="header">
      <div class="leftSideHeader">
        <h1 class="pagetitle">Dashboard</h1>
      </div>
      <div class="rightSideHeader">
        <button class="chooseMonths">
          Novembro <img src="images/chevron-down.svg" alt="Seta Para Baixo" />
        </button>
      </div>
    </div>
    <div class="pagecontent">
      <div class="leftSidePage">
        <div class="moneybalance">
          <div class="leftside">
            <div class="walletname">
              <img
                src="images/Wallet.svg"
                alt="ÌconeCarteira"
                style="
                  background: #0f0e11;
                  padding: 10px;
                  border-radius: 8.533px;
                "
              />
              <p>Saldo</p>
            </div>
            <div class="accountbalance">
              <p>R$ 2.700</p>
              <img src="images/eye.svg" alt="Esconder/Mostrar" />
            </div>
          </div>
          <div class="addtransaction">
            <button
              class="transactionbutton"
              onclick="openmodal()"
              id="transactionButton"
            >
              Adicionar Transação<img
                src="images/arrow-down-up.svg"
                alt="SetaCimaEBaixo"
                id="transactionbutton"
              />
            </button>
          </div>
        </div>
        <div style="display: flex; gap: 24px">
          <div class="investments">
            <div class="financialicons">
              <img
                class="iconstyles"
                src="images/Piggy Bank.svg"
                alt="Porquinho"
                style="background: rgba(255, 255, 255, 0.08)"
              />
              <p>Investido</p>
            </div>
            <div class="financialvalue"><p>R$ 3.500</p></div>
          </div>
          <div class="inflowoutflow">
            <div class="financialicons">
              <img
                class="iconstyles"
                src="images/Trending Up.svg"
                alt="EstatísticaAcima"
                style="background: rgba(85, 176, 46, 0.08)"
              />
              <p>Receita</p>
            </div>
            <div class="financialvalue"><p>R$ 8.150</p></div>
          </div>
          <div class="inflowoutflow">
            <div class="financialicons">
              <img
                class="iconstyles"
                src="images/Trending Down.svg"
                alt="EstatísticaAbaixo"
                style="background: rgba(246, 53, 46, 0.08)"
              />
              <p>Despesas</p>
            </div>
            <div class="financialvalue"><p>R$ 2.950</p></div>
          </div>
        </div>
      </div>
      <div class="transactionsDisplay" id="transactionsDisplay">
        <div class="transactionsInterior">
          <div class="transactionsName"><p>Transações</p></div>
          <div class="showAll">
            <button class="showAllInterior">Ver Mais</button>
          </div>
        </div>
        <div class="hrDisplay"></div>
      </div>
    </div>
    <script type="module">
      import { add } from "./adddata.js";
      import { formatNumbers } from "./formatnumber.js";
      import { openModal } from "./openmodal.js";
      import { closeModal } from "./closemodal.js";
      import { displayData } from "./displaydata.js";

      const addButton = document.getElementById("button");
      addButton.onclick = add;

      const formatNumber = document.getElementById("value");
      formatNumber.oninput = function (event) {
        const inputValue = event.target.value;
        const formattedNumber = formatNumbers(inputValue);
        formatNumber.value = formattedNumber;
      };

      const open = document.getElementById("transactionButton");
      open.onclick = openModal;

      const close = document.getElementById("backgroundModal");
      const cancel = document.getElementById("cancelButton");
      close.onclick = closeModal;
      cancel.onclick = closeModal;

      const display = document.getElementById("body");
      display.onload = displayData;
    </script>
  </body>
</html>
